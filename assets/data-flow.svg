<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#facc15"/>
    </marker>
  </defs>
  <rect width="1100" height="650" fill="#0d1117"/>
  <text x="550" y="58" fill="#f3f4f6" font-family="Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">Forge Data and Calculation Flow</text>
  <text x="550" y="94" fill="#aab4c3" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">How profile and workout inputs become useful feedback for the user</text>

  <g font-family="Arial, sans-serif" text-anchor="middle" font-size="18">
    <rect x="80" y="160" width="245" height="95" rx="18" fill="#111827" stroke="#3b82f6" stroke-width="3"/>
    <text x="202" y="200" fill="#f3f4f6" font-weight="700">User Profile Inputs</text>
    <text x="202" y="226" fill="#aab4c3" font-size="15">age, sex, height, weight, activity</text>

    <rect x="430" y="160" width="245" height="95" rx="18" fill="#111827" stroke="#f97316" stroke-width="3"/>
    <text x="552" y="200" fill="#f3f4f6" font-weight="700">Health Metrics</text>
    <text x="552" y="226" fill="#aab4c3" font-size="15">BMI, BMR, TDEE</text>

    <rect x="775" y="160" width="245" height="95" rx="18" fill="#111827" stroke="#facc15" stroke-width="3"/>
    <text x="897" y="200" fill="#f3f4f6" font-weight="700">Macro Targets</text>
    <text x="897" y="226" fill="#aab4c3" font-size="15">calories, protein, carbs, fats</text>

    <rect x="80" y="390" width="245" height="95" rx="18" fill="#111827" stroke="#3b82f6" stroke-width="3"/>
    <text x="202" y="430" fill="#f3f4f6" font-weight="700">Workout Inputs</text>
    <text x="202" y="456" fill="#aab4c3" font-size="15">exercise, sets, reps, weight, RPE</text>

    <rect x="430" y="390" width="245" height="95" rx="18" fill="#111827" stroke="#22c55e" stroke-width="3"/>
    <text x="552" y="430" fill="#f3f4f6" font-weight="700">Stored History</text>
    <text x="552" y="456" fill="#aab4c3" font-size="15">JSON workout entries</text>

    <rect x="775" y="390" width="245" height="95" rx="18" fill="#111827" stroke="#f97316" stroke-width="3"/>
    <text x="897" y="430" fill="#f3f4f6" font-weight="700">Progress Feedback</text>
    <text x="897" y="456" fill="#aab4c3" font-size="15">overload status and next-session guidance</text>
  </g>

  <g stroke="#facc15" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M325 207 L428 207"/>
    <path d="M675 207 L773 207"/>
    <path d="M325 437 L428 437"/>
    <path d="M675 437 L773 437"/>
  </g>
</svg>
